[tool.ruff]
target-version = "py310"
line-length = 120

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist"
]

[tool.ruff.lint]
select = [
    "F",
    "E",
    "W",
    "I",
    "UP",
    "B",
    "C4",
    "RUF"
]
ignore = [
    "E501", # Ignore line too long errors
    "B008"  # Ignore function call Depends/Query in default argument (FastAPI dependency injection)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
