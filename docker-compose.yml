services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runify
      POSTGRES_PASSWORD: runify
      POSTGRES_DB: runify
    ports:
      - "5432:5432"
    volumes:
      - runify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runify -d runify"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://runify:runify@postgres:5432/runify
      - SECRET_KEY=dev-secret-change-in-production
      - DEBUG=True
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  runify_pgdata:
