services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runify
      POSTGRES_PASSWORD: runify
      POSTGRES_DB: runify
    ports:
      - "5432:5432" # TODO: remove this in production
    volumes:
      - runify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runify -d runify"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://runify:runify@postgres:5432/runify
      - SECRET_KEY=dev-secret-change-in-production
      - DEBUG=True
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - web

volumes:
  frontend_node_modules:
  runify_pgdata:
